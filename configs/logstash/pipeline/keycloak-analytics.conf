input {
  kafka {
    bootstrap_servers => "kafka:9092"
    topics => ["keycloak-events", "keycloak-audit", "keycloak-user-updates"]
    codec => json
    consumer_threads => 4
  }
}

filter {
  # Parse Keycloak events
  if [topic] == "keycloak-events" {
    mutate {
      add_field => { "[@metadata][index]" => "keycloak-events" }
      add_field => { "[@metadata][type]" => "event" }
    }

    date {
      match => [ "event_time", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSSZ" ]
      target => "@timestamp"
    }

    # Enrich with geoip
    if [ip_address] {
      geoip {
        source => "ip_address"
        target => "geoip"
      }
    }
  }

  # Parse audit events
  if [topic] == "keycloak-audit" {
    mutate {
      add_field => { "[@metadata][index]" => "keycloak-audit" }
      add_field => { "[@metadata][type]" => "audit" }
    }

    date {
      match => [ "time", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSSZ" ]
      target => "@timestamp"
    }
  }

  # Parse user updates
  if [topic] == "keycloak-user-updates" {
    mutate {
      add_field => { "[@metadata][index]" => "keycloak-user-updates" }
      add_field => { "[@metadata][type]" => "user_update" }
    }

    date {
      match => [ "updated_at", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSSZ" ]
      target => "@timestamp"
    }
  }

  # Remove sensitive fields
  mutate {
    remove_field => [ "password", "secret", "token" ]
  }
}

output {
  # Output to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "%{[@metadata][index]}-%{+YYYY.MM.dd}"
    document_id => "%{id}"
  }

  # Also output to stdout for debugging (remove in production)
  # stdout {
  #   codec => rubydebug
  # }
}
