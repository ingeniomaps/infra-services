global
    log stdout format raw local0
    maxconn 100000
    tune.ssl.default-dh-param 2048
    stats socket /var/lib/haproxy/stats mode 660 level admin
    stats timeout 2m

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option forwardfor
    option http-server-close
    timeout connect 10s
    timeout client 30s
    timeout server 30s
    timeout http-request 10s
    timeout http-keep-alive 10s
    timeout check 10s
    retries 3
    option redispatch
    balance roundrobin

# Stats page
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 30s
    stats admin if TRUE
    http-request use-service prometheus-exporter if { path /metrics }

# Health check endpoint
frontend health
    bind *:9999
    http-request return status 200 content-type "text/plain" string "OK\n"

# Main frontend - HTTP
frontend keycloak_http
    bind *:80
    redirect scheme https code 301 if !{ ssl_fc }

# Main frontend - HTTPS
frontend keycloak_https
    bind *:443 ssl crt /etc/ssl/certs/keycloak.pem

    # Security headers
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    http-response set-header X-Frame-Options "DENY"
    http-response set-header X-Content-Type-Options "nosniff"
    http-response set-header X-XSS-Protection "1; mode=block"

    # Session affinity (sticky sessions)
    # Usar cookie para mantener sesión en el mismo backend
    cookie KC_STICKY insert indirect nocache httponly secure

    # ACLs para routing
    acl is_health_check path_beg /health
    acl is_metrics path_beg /metrics

    # Route health checks directly
    use_backend keycloak_health if is_health_check
    use_backend keycloak_metrics if is_metrics

    # Default routing to Keycloak cluster
    default_backend keycloak_cluster

# Health check backend
backend keycloak_health
    option httpchk GET /health/ready
    http-check expect status 200
    server keycloak-1 keycloak-1:8080 check inter 5s fall 3 rise 2
    server keycloak-2 keycloak-2:8080 check inter 5s fall 3 rise 2
    server keycloak-3 keycloak-3:8080 check inter 5s fall 3 rise 2

# Metrics backend
backend keycloak_metrics
    option httpchk GET /metrics
    http-check expect status 200
    server keycloak-1 keycloak-1:8080 check inter 10s
    server keycloak-2 keycloak-2:8080 check inter 10s
    server keycloak-3 keycloak-3:8080 check inter 10s

# Main Keycloak cluster backend
backend keycloak_cluster
    # Health check configuration
    option httpchk GET /health/ready
    http-check expect status 200

    # Session affinity - sticky sessions
    cookie KC_STICKY insert indirect nocache httponly secure

    # Load balancing algorithm
    balance source

    # Server configuration with health checks
    server keycloak-1 keycloak-1:8080 check inter 5s fall 3 rise 2 cookie keycloak-1 weight 100
    server keycloak-2 keycloak-2:8080 check inter 5s fall 3 rise 2 cookie keycloak-2 weight 100
    server keycloak-3 keycloak-3:8080 check inter 5s fall 3 rise 2 cookie keycloak-3 weight 100

    # Backup servers (opcional, para escalamiento futuro)
    # server keycloak-4 keycloak-4:8080 check inter 5s fall 3 rise 2 cookie keycloak-4 weight 100 backup
    # server keycloak-5 keycloak-5:8080 check inter 5s fall 3 rise 2 cookie keycloak-5 weight 100 backup

    # Timeouts
    timeout connect 10s
    timeout server 30s
    timeout check 10s

    # Retry configuration
    retries 3
    option redispatch

# Monitoring - Prometheus exporter
listen prometheus
    bind *:9101
    mode http
    stats enable
    stats uri /metrics
    stats refresh 30s
