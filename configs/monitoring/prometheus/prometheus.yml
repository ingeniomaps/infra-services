global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'keycloak-production'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - alertmanager:9093

# Load rules
rule_files:
  - "rules/*.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Keycloak metrics - Single instance
  - job_name: 'keycloak'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['keycloak:8080']
    scrape_interval: 30s
    scrape_timeout: 10s

  # Keycloak cluster metrics - Multiple instances
  - job_name: 'keycloak-cluster'
    metrics_path: '/metrics'
    static_configs:
      - targets:
        - 'keycloak-cluster-1:8080'
        - 'keycloak-cluster-2:8080'
        - 'keycloak-cluster-3:8080'
    scrape_interval: 30s
    scrape_timeout: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):.*'
        replacement: '${1}'

  # Node Exporter
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # PostgreSQL Exporter (si está configurado)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s

  # PgBouncer Exporter (si está configurado)
  - job_name: 'pgbouncer'
    static_configs:
      - targets: ['pgbouncer-exporter:9127']
    scrape_interval: 30s
