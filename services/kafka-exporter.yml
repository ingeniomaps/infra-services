# Prometheus Exporter - Kafka.
# Métricas: topics, particiones, consumer groups, lag, throughput.
# Requiere Kafka en red ${NETWORK_NAME}.
# Dashboard Grafana recomendado: ID 7589
# Uso: incluido en make infra-full

name: ${PROJECT_PREFIX:-kafka-exporter}${PROJECT_PREFIX:+-kafka-exporter}

services:
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.9.0
    container_name: ${PROJECT_PREFIX:-kafka-exporter}${PROJECT_PREFIX:+-kafka-exporter}
    command:
      - '--kafka.server=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}'
    networks:
      - default
    ports:
      - '9308:9308'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:9308/healthz || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

networks:
  default:
    name: ${NETWORK_NAME}
    external: true
