# Kafka UI - Producción BAJO (kafbat fork, reemplazo de provectuslabs abandonado).
# Requiere Kafka en red ${NETWORK_NAME} (kafka:9092).
# Red: docker network create ${NETWORK_NAME}
# Uso: make infra-kafka-ui

name: ${PROJECT_PREFIX:-kafka-ui}${PROJECT_PREFIX:+-kafka-ui}

services:
  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:v1.4.2
    container_name: ${PROJECT_PREFIX:-kafka-ui}${PROJECT_PREFIX:+-kafka-ui}
    environment:
      KAFKA_CLUSTERS_0_NAME: ${KAFKA_UI_CLUSTER_NAME:-cluster}
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
    networks:
      - default
    ports:
      - '127.0.0.1:${KAFKA_UI_PORT:-8081}:8080'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:8080/api/clusters || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

networks:
  default:
    name: ${NETWORK_NAME}
    external: true
