# Prometheus Exporter - PgBouncer.
# Métricas: pool activo, conexiones en espera, saturación, avg query time.
# Requiere PgBouncer en red ${NETWORK_NAME}.
# Dashboard Grafana recomendado: ID 14022
# Uso: incluido en make infra-full

name: ${PROJECT_PREFIX:-pgbouncer-exporter}${PROJECT_PREFIX:+-pgbouncer-exporter}

services:
  pgbouncer-exporter:
    image: prometheuscommunity/pgbouncer-exporter:v0.11.0
    container_name: ${PROJECT_PREFIX:-pgbouncer-exporter}${PROJECT_PREFIX:+-pgbouncer-exporter}
    command:
      - '--pgBouncer.connectionString=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${PGBOUNCER_HOST:-pgbouncer}:${PGBOUNCER_PORT:-6432}/pgbouncer?sslmode=disable'
    networks:
      - default
    ports:
      - '9127:9127'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:9127/ || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'

networks:
  default:
    name: ${NETWORK_NAME}
    external: true
