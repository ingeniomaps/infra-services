# Logstash - Pipeline de procesamiento de logs.
# Pipeline en infra/services/logstash/pipeline; config en logstash/config.
# El pipeline por defecto es un placeholder (stdin/stdout). Ajustar para producción.
# Red: docker network create ${NETWORK_NAME}
# Uso: docker compose -f infra/services/logstash.yml --env-file .env up -d

name: ${PROJECT_PREFIX:-logstash}${PROJECT_PREFIX:+-logstash}

services:
  logstash:
    image: docker.elastic.co/logstash/logstash:9.3.1
    container_name: ${PROJECT_PREFIX:-logstash}${PROJECT_PREFIX:+-logstash}
    environment:
      LS_JAVA_OPTS: ${LS_JAVA_OPTS:--Xms512m -Xmx512m}
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logstash/config:/usr/share/logstash/config:ro
    networks:
      - default
    ports:
      - '${LOGSTASH_PORT:-5044}:5044'
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9600/_node/stats || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'
        reservations:
          memory: 512M
          cpus: '0.25'

networks:
  default:
    name: ${NETWORK_NAME}
    external: true
