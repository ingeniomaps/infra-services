# PostgreSQL - Producción BAJO (mínimo viable: una instancia, carga moderada).
# Secrets obligatorios en .env: POSTGRES_PASSWORD (y opcional POSTGRES_USER, POSTGRES_DB).
# Red: docker network create ${NETWORK_NAME}
# Uso: make infra-postgres

name: ${PROJECT_PREFIX:-postgres}${PROJECT_PREFIX:+-postgres}

services:
  postgres:
    image: postgres:18.3-alpine
    container_name: ${PROJECT_PREFIX:-postgres}${PROJECT_PREFIX:+-postgres}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: '-E UTF8'
    volumes:
      - data:/var/lib/postgresql
    networks:
      - default
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 512M
          cpus: '0.5'

volumes:
  data:
    driver: local

networks:
  default:
    name: ${NETWORK_NAME}
    external: true
