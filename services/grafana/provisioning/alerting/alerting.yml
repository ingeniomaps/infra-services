apiVersion: 1

# Contact points — Configurar SLACK_WEBHOOK_URL en las variables de Grafana
# o directamente aquí para producción.
contactPoints:
  - orgId: 1
    name: slack-notifications
    receivers:
      - uid: slack-default
        type: slack
        settings:
          url: ${GRAFANA_SLACK_WEBHOOK_URL}
          title: |
            {{ if eq .Status "firing" }}🔴 ALERTA{{ else }}🟢 Resuelta{{ end }}
          text: |
            {{ range .Alerts }}
            **{{ .Labels.alertname }}** ({{ .Labels.severity }})
            {{ .Annotations.summary }}
            {{ .Annotations.description }}
            {{ if .Annotations.action }}➡️ *Acción:* {{ .Annotations.action }}{{ end }}
            {{ end }}

# Políticas de notificación
policies:
  - orgId: 1
    receiver: slack-notifications
    group_by: ['alertname', 'severity']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: slack-notifications
        matchers:
          - severity = critical
        group_wait: 10s
        repeat_interval: 1h
