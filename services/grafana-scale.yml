# Grafana - Override de recursos para producción FUERTE.
# Uso: docker compose -f grafana.yml -f grafana-scale.yml up -d

name: ${PROJECT_PREFIX:-grafana}${PROJECT_PREFIX:+-grafana}

services:
  grafana:
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'
        reservations:
          memory: 512M
          cpus: '0.5'
