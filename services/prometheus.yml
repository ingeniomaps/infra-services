# Prometheus - Métricas y alertas.
# Config: services/prometheus/prometheus.yml (añadir scrape_configs para tus servicios).
# Red: docker network create ${NETWORK_NAME}
# Uso: make infra-monitoring

name: ${PROJECT_PREFIX:-prometheus}${PROJECT_PREFIX:+-prometheus}

services:
  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: ${PROJECT_PREFIX:-prometheus}${PROJECT_PREFIX:+-prometheus}
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}'
      - '--storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-10GB}'
      - '--web.enable-lifecycle=false'
    volumes:
      - ${INFRA_SERVICES_PATH}/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - data:/prometheus
    networks:
      - default
    ports:
      - '127.0.0.1:${PROMETHEUS_PORT:-9090}:9090'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:9090/-/healthy']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

volumes:
  data:
    driver: local

networks:
  default:
    name: ${NETWORK_NAME}
    external: true
