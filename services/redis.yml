# Redis - Producción BAJO (una instancia, carga moderada).
# Obligatorio en .env: REDIS_PASSWORD. Opcional: REDIS_MAXMEMORY.
# Red: docker network create ${NETWORK_NAME}
# Uso: make infra-redis

name: ${PROJECT_PREFIX:-redis}${PROJECT_PREFIX:+-redis}

services:
  redis:
    image: redis:8.6.1-alpine
    container_name: ${PROJECT_PREFIX:-redis}${PROJECT_PREFIX:+-redis}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: >
      redis-server
      --maxmemory ${REDIS_MAXMEMORY:-1gb}
      --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
      --appendonly yes
      --requirepass $$REDIS_PASSWORD
    volumes:
      - data:/data
    networks:
      - default
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'redis-cli -a "$$REDIS_PASSWORD" --no-auth-warning ping | grep -q PONG'
        ]
      interval: 10s
      timeout: 3s
      retries: 5
    ports:
      - '${REDIS_PORT:-6379}:6379'
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
        reservations:
          memory: 256M
          cpus: '0.25'

volumes:
  data:
    driver: local

networks:
  default:
    name: ${NETWORK_NAME}
    external: true
