# Prometheus Exporter - Elasticsearch.
# Métricas: índices, shards, JVM, búsquedas/seg, ingest pipelines.
# Requiere Elasticsearch en red ${NETWORK_NAME}.
# Dashboard Grafana recomendado: ID 2322
# Uso: docker compose -f infra/services/elasticsearch-exporter.yml --env-file .env up -d

name: ${PROJECT_PREFIX:-elasticsearch-exporter}${PROJECT_PREFIX:+-elasticsearch-exporter}

services:
  elasticsearch-exporter:
    image: quay.io/prometheuscommunity/elasticsearch-exporter:v1.10.0
    container_name: ${PROJECT_PREFIX:-es-exporter}${PROJECT_PREFIX:+-es-exporter}
    command:
      - '--es.uri=http://${ELASTICSEARCH_HOST:-elasticsearch}:${ELASTICSEARCH_PORT:-9200}'
      - '--es.all'
      - '--es.indices'
    networks:
      - default
    ports:
      - '9114:9114'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:9114/ || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

networks:
  default:
    name: ${NETWORK_NAME}
    external: true
