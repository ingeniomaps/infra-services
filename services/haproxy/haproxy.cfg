# HAProxy mínimo reutilizable. Sustituir backend servers por tus servicios.
global
  maxconn 4096
  log stdout format raw local0

defaults
  mode http
  timeout connect 5s
  timeout client  30s
  timeout server  30s
  log global

# Stats (opcional)
listen stats
  bind *:8404
  mode http
  stats enable
  stats uri /
  stats refresh 10s

# Frontend HTTP (redirigir a HTTPS en producción)
frontend http
  bind *:80
  default_backend app

# Backend de ejemplo: ajustar server lines a tus contenedores (red infra)
backend app
  balance roundrobin
  option httpchk
  http-check expect status 200
  server app1 app1:8080 check
  server app2 app2:8080 check
  server app3 app3:8080 check
