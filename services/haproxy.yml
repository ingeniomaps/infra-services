# HAProxy - Producción BAJO (un balanceador, carga moderada).
# Editar services/haproxy/haproxy.cfg con tus backends. TLS en proxy externo o en haproxy-scale.
# Red: docker network create ${NETWORK_NAME}
# Uso: make infra-haproxy

name: ${PROJECT_PREFIX:-haproxy}${PROJECT_PREFIX:+-haproxy}

services:
  haproxy:
    image: haproxy:3.3.5-alpine
    container_name: ${PROJECT_PREFIX:-haproxy}${PROJECT_PREFIX:+-haproxy}
    volumes:
      - ${INFRA_SERVICES_PATH}/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - '${HAPROXY_HTTP_PORT:-80}:80'
      - '${HAPROXY_HTTPS_PORT:-443}:443'
      - '${HAPROXY_STATS_PORT:-8404}:8404'
    networks:
      - default
    healthcheck:
      test: ['CMD', 'haproxy', '-c', '-f', '/usr/local/etc/haproxy/haproxy.cfg']
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'

networks:
  default:
    name: ${NETWORK_NAME}
    external: true
