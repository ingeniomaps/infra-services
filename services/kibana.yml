# Kibana - Producción BAJO. Requiere Elasticsearch en red ${NETWORK_NAME} (elasticsearch:9200).
# Red: docker network create ${NETWORK_NAME}
# Uso: make infra-elasticsearch

name: ${PROJECT_PREFIX:-kibana}${PROJECT_PREFIX:+-kibana}

services:
  kibana:
    image: docker.elastic.co/kibana/kibana:9.3.1
    container_name: ${PROJECT_PREFIX:-kibana}${PROJECT_PREFIX:+-kibana}
    environment:
      ELASTICSEARCH_HOSTS: http://${ELASTICSEARCH_HOST:-elasticsearch}:${ELASTICSEARCH_PORT:-9200}
      SERVER_NAME: kibana
      SERVER_HOST: "0.0.0.0"
    networks:
      - default
    ports:
      - '${KIBANA_PORT:-5601}:5601'
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:5601/api/status || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'
        reservations:
          memory: 512M
          cpus: '0.25'

networks:
  default:
    name: ${NETWORK_NAME}
    external: true
