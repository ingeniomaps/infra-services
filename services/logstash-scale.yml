# Logstash - Override de recursos para producción FUERTE.
# Uso: docker compose -f logstash.yml -f logstash-scale.yml up -d

name: ${PROJECT_PREFIX:-logstash}${PROJECT_PREFIX:+-logstash}

services:
  logstash:
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
        reservations:
          memory: 2G
          cpus: '0.5'
